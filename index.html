    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="description" content="Rohit Jain — AI Engineer building production RAG systems, LLM agents, and document intelligence platforms. 17+ years enterprise architecture." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Flash prevention: apply dark class before first paint
      (function() {
        var themeId = localStorage.getItem('themeId');
        // Default is parchment-light; only add dark for charcoal
        if (themeId === 'charcoal-dark') {
          document.documentElement.classList.add('dark');
        }
      })();
      // SPA redirect handler for GitHub Pages 404.html
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      }(window.location));
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
