<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <style>body{font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;background:#fafafa;color:#71717a;}.loader{text-align:center;}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4f46e5;margin:0 3px;animation:bounce .6s infinite alternate;}
  .dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
  @keyframes bounce{to{opacity:.3;transform:translateY(-6px);}}</style>
  <script>
    // SPA redirect for GitHub Pages
    // Converts /path to /?/path so index.html can handle routing
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <noscript><p>Redirecting&hellip; Please enable JavaScript.</p></noscript>
  <div class="loader">
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>
</body>
</html>
